name: Deploy Demo Shoppingmall Web

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/**
      - public/**
      - index.html
      - vite.config.ts
      - tsconfig*.json
      - eslint.config.js
      - package.json
      - package-lock.json
      - .github/workflows/deploy-demo-shoppingmall-web.yml

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    name: Verify frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck, lint, test, and build
        run: npm run verify

  deploy:
    needs: verify
    uses: krafton-jungle-project-4team/loop-ad_infra/.github/workflows/frontend-deploy.yml@main
    with:
      environment: dev
      aws_region: ${{ vars.LOOPAD_DEV_AWS_REGION }}
      role_arn: ${{ vars.LOOPAD_DEV_DEPLOY_ROLE_ARN }}
      node_version: "25"
      working_directory: .
      install_command: npm ci
      build_command: npm run build
      build_output_dir: dist
      s3_bucket: loop-ad-dev-demo-shoppingmall-web
      s3_prefix: .
      cloudfront_distribution_id: ${{ vars.LOOPAD_DEMO_SHOPPINGMALL_WEB_CLOUDFRONT_DISTRIBUTION_ID }}
      cloudfront_invalidation_paths: "/*"
      asset_cache_control: public, max-age=31536000, immutable
      html_cache_control: no-cache
