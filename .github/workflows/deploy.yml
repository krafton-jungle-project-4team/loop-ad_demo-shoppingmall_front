name: Deploy Demo Shoppingmall Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: krafton-jungle-project-4team/loop-ad_infra/.github/workflows/frontend-deploy.yml@main
    with:
      environment: dev
      aws_region: ap-northeast-2
      role_arn: ${{ vars.LOOP_AD_DEV_FRONTEND_DEPLOY_ROLE_ARN }}
      node_version: "25"
      working_directory: .
      install_command: corepack enable && pnpm install --frozen-lockfile
      build_command: pnpm build
      build_output_dir: dist
      s3_bucket: loop-ad-dev-demo-shoppingmall-web
      s3_prefix: .
      cloudfront_distribution_id: ${{ vars.LOOP_AD_DEV_DEMO_SHOPPINGMALL_WEB_CLOUDFRONT_DISTRIBUTION_ID }}
      cloudfront_invalidation_paths: /*
      asset_cache_control: public,max-age=31536000,immutable
      html_cache_control: no-cache,no-store,must-revalidate
